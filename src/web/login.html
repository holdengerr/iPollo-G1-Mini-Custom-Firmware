<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>G1 Mini Login</title>
<style>
:root{color-scheme:dark;--bg:#0d1014;--panel:#151a20;--line:#2a333d;--text:#e8eef5;--muted:#91a0ad;--blue:#68a8ff;--bad:#ef6b6b}
*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:var(--bg);color:var(--text);font:14px/1.45 system-ui,-apple-system,Segoe UI,Arial,sans-serif}
.panel{width:min(420px,calc(100vw - 24px));background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:18px}
h1{font-size:22px;margin:0 0 4px}.sub{color:var(--muted);font-size:12px;margin-bottom:16px}.row{display:grid;gap:6px;margin:12px 0}.row label{color:var(--muted)}
input{width:100%;background:#10151b;color:var(--text);border:1px solid #2a333d;border-radius:6px;padding:10px;font:14px system-ui,Segoe UI,Arial}input:focus{outline:1px solid var(--blue);border-color:var(--blue)}
button{appearance:none;border:1px solid #4078c8;background:#173154;color:var(--text);border-radius:6px;padding:10px 12px;font:14px system-ui,Segoe UI,Arial;cursor:pointer;width:100%;margin-top:10px}
.note{color:var(--muted);font-size:12px;margin-top:10px}.status{min-height:22px;margin-top:10px}.bad{color:var(--bad)}
</style>
</head>
<body>
<main class="panel">
  <h1>G1 Mini Login</h1>
  <div class="sub">default credentials: <code>admin</code> / <code>admin</code></div>
  <div class="row"><label for="username">Username</label><input id="username" value="admin" autocomplete="username"></div>
  <div class="row"><label for="password">Password</label><input id="password" type="password" value="" autocomplete="new-password" autocapitalize="off" autocorrect="off" spellcheck="false"></div>
  <button id="login">Login</button>
  <div class="status" id="status"></div>
  <div class="note">The session is kept by cookie in this browser.</div>
</main>
<script>
const api="/cgi-bin/g1-admin",$=id=>document.getElementById(id),next=new URLSearchParams(location.search).get("next")||"/admin.html";
function msg(t,bad){const el=$("status");el.textContent=t||"";el.className="status"+(bad?" bad":"")}
async function login(){msg("logging in...");const body=new URLSearchParams({action:"login",username:$("username").value,password:$("password").value});const r=await fetch(api,{method:"POST",credentials:"same-origin",headers:{"Content-Type":"application/x-www-form-urlencoded"},body});const j=await r.json().catch(()=>({ok:false,error:"invalid response"}));if(j.ok){location.href=next;return}msg(j.error||"login failed",true)}
$("login").onclick=login;$("password").addEventListener("keydown",e=>{if(e.key==="Enter")login()});
</script>
</body>
</html>
